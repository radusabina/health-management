<div class="bg-fitbite">
  <div class="container py-4 d-flex justify-content-center">
    <div class="w-100" style="max-width: 900px">
      <!-- STATE 1: SIMPLE CENTER UI -->
      <div
        *ngIf="!manualMode && analyzedMode"
        class="d-flex justify-content-center align-items-center"
        style="min-height: 70vh"
      >
        <div class="w-100" style="max-width: 520px">
          <!-- HEADER -->
          <div class="d-flex align-items-center mb-3">
            <img
              src="assets/fitbite.png"
              alt="logo"
              class="me-2 logo-responsive"
            />

            <div class="text-start ms-3">
              <h1 class="mb-0 title-meal">Add Meal</h1>

              <small class="text-muted d-block fs-6">
                Describe your meal or add items manually.
              </small>
            </div>
          </div>

          <!-- Description -->
          <div class="mb-3 text-start">
            <label class="form-label text-muted">What did you eat?</label>
            <textarea
              class="form-control"
              rows="3"
              [(ngModel)]="description"
              placeholder="e.g. chicken 200g, rice 100g"
            ></textarea>
          </div>

          <!-- Primary action -->
          <button
            class="btn btn-fitbite text-white w-100 mb-2"
            (click)="analyzeMeal()"
            [disabled]="isAnalyzing"
          >
            <span *ngIf="!isAnalyzing">Analyze meal</span>

            <span *ngIf="isAnalyzing">
              Analyzing...
              <span class="spinner-border spinner-border-sm ms-2"></span>
            </span>
          </button>

          <!-- Secondary action -->
          <button
            class="btn btn-link w-100 p-0 text-decoration-none"
            (click)="enableManualMode()"
          >
            Add items manually
          </button>
        </div>
      </div>

      <!-- STATE 2: MANUAL MODE -->
      <div *ngIf="manualMode">
        <div class="row g-4">
          <!-- LEFT COLUMN -->
          <div class="col-12 col-md-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="mb-0">Meal Type</h5>

              <button
                class="btn btn-sm btn-outline-secondary"
                (click)="backToStep1()"
              >
                Back
              </button>
            </div>

            <select class="form-select" [(ngModel)]="mealType">
              <option value="" disabled selected>Select meal type</option>
              <option *ngFor="let type of mealTypes" [value]="type">
                {{ type }}
              </option>
            </select>
          </div>

          <!-- RIGHT COLUMN -->
          <!-- RIGHT -->
          <div class="col-12 col-md-7">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="mb-0">Detected Items</h5>

              <button
                class="btn btn-sm btn-outline-secondary"
                (click)="addItem()"
                [disabled]="!canAddItem()"
              >
                + Add item
              </button>
            </div>

            <p class="text-muted small mb-3">Amount is displayed in grams</p>

            <!-- TABLE HEADER (only if items exist) -->
            <div
              *ngIf="mealItems.items.length > 0"
              class="row small text-muted fw-semibold mb-2 px-1"
            >
              <div class="col-6">Name</div>
              <div class="col-4">Quantity (g)</div>
              <div class="col-2 text-end">Actions</div>
            </div>

            <!-- ITEMS -->
            <div
              *ngFor="let item of mealItems.items; let i = index"
              class="row g-2 align-items-center mb-2"
            >
              <!-- NAME -->
              <div class="col-6">
                <input
                  class="form-control"
                  placeholder="Food name"
                  [(ngModel)]="item.name"
                />
              </div>

              <!-- QUANTITY -->
              <div class="col-4">
                <input
                  type="number"
                  class="form-control"
                  placeholder="g"
                  [(ngModel)]="item.quantityGrams"
                />
              </div>

              <!-- DELETE -->
              <div class="col-2 text-end">
                <button
                  class="btn btn-outline-danger btn-sm"
                  (click)="removeItem(i)"
                >
                  ✕
                </button>
              </div>
            </div>

            <!-- EMPTY STATE -->
            <div
              *ngIf="mealItems.items.length === 0"
              class="text-muted small text-center py-3"
            >
              No items detected. Click “+ Add item” to start.
            </div>

            <!-- ACTIONS -->
            <div class="mt-3 d-grid gap-2">
              <button class="btn btn-fitbite text-white">Confirm Meal</button>
              <button class="btn btn-outline-secondary">Re-analyze</button>
            </div>
          </div>
        </div>
      </div>

      <!-- STATE 3: ANALYZED MEAL -->
      <div
        *ngIf="!analyzedMode"
        class="d-flex justify-content-center align-items-center"
        style="min-height: 70vh"
      >
        <div class="w-100" style="max-width: 900px">
          <div class="row g-4 align-items-start">
            <!-- LEFT -->
            <div class="col-12 col-md-5">
              <div class="mb-3 text-start">
                <label class="form-label text-muted">Meal Type</label>
                <select class="form-select" [(ngModel)]="mealType">
                  <option value="" disabled>Select meal type</option>
                  <option *ngFor="let type of mealTypes" [value]="type">
                    {{ type }}
                  </option>
                </select>
              </div>

              <button
                class="btn btn-link w-100 p-0 text-decoration-underline text-center"
                (click)="backToStep1()"
              >
                Enter another description
              </button>
            </div>

            <!-- RIGHT -->
            <div class="col-12 col-md-7">
              <div
                class="d-flex justify-content-between align-items-center mb-1"
              >
                <h5 class="mb-0">Detected Items</h5>

                <button
                  class="btn btn-sm btn-outline-secondary"
                  (click)="addItem()"
                  [disabled]="!canAddItem()"
                >
                  + Add item
                </button>
              </div>

              <p class="text-muted small mb-3">Amount is displayed in grams</p>

              <div
                *ngFor="let item of mealItems.items; let i = index"
                class="card border-0 shadow-sm p-3 mb-2"
              >
                <div class="row g-2 align-items-center">
                  <div class="col-6">
                    <input class="form-control" [(ngModel)]="item.name" />
                  </div>

                  <div class="col-3">
                    <label class="form-label small text-muted mb-1"
                      >Quantity (g)</label
                    >
                    <input
                      type="number"
                      class="form-control"
                      [(ngModel)]="item.quantityGrams"
                    />
                  </div>

                  <div class="col-2 text-end">
                    <button
                      class="btn btn-outline-danger btn-sm"
                      (click)="removeItem(i)"
                    >
                      ✕
                    </button>
                  </div>
                </div>
              </div>

              <div
                *ngIf="mealItems.items.length === 0"
                class="text-muted small"
              >
                No items detected.
              </div>

              <div class="mt-3 d-grid gap-2">
                <button class="btn btn-fitbite text-white">Confirm Meal</button>
                <button class="btn btn-outline-secondary">Re-analyze</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
