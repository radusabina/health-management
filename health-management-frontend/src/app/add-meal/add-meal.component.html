<div
  class="bg-fitbite d-flex align-items-center justify-content-center"
  style="min-height: 100vh"
>
  <div class="container py-4">
    <div class="w-100 mx-auto content-card">
      <!-- STATE 1 -->
      <div *ngIf="!manualMode" class="d-flex justify-content-center">
        <div style="max-width: 520px; width: 100%">
          <div class="d-flex align-items-center mb-3">
            <img src="assets/fitbite.png" class="me-2 logo-responsive" />

            <div class="text-start ms-3">
              <h1 class="mb-0 title-meal">Add Meal</h1>
              <small class="text-muted d-block fs-6">
                Describe your meal or add items manually.
              </small>
            </div>
          </div>

          <textarea
            class="form-control"
            [class.is-invalid]="descriptionError"
            rows="3"
            [(ngModel)]="description"
            (ngModelChange)="descriptionError = ''; analyzeErrorMsg = ''"
            placeholder="e.g. chicken 200g, rice 100g"
          ></textarea>
          <div *ngIf="descriptionError" class="text-danger small mt-1 mb-2">
            {{ descriptionError }}
          </div>
          <div *ngIf="!descriptionError" class="mb-3"></div>

          <button
            class="btn btn-fitbite text-white w-100 mb-2"
            (click)="analyzeMeal()"
            [disabled]="isAnalyzing"
          >
            <span *ngIf="!isAnalyzing">Analyze meal</span>
            <span *ngIf="isAnalyzing">Analyzing...</span>
          </button>

          <div *ngIf="analyzeErrorMsg" class="text-danger small mb-2">
            {{ analyzeErrorMsg }}
          </div>

          <button class="btn btn-link w-100 p-0" (click)="enableManualMode()">
            Add items manually
          </button>
        </div>
      </div>

      <div *ngIf="manualMode" class="d-flex justify-content-center">
        <div class="w-100" style="max-width: 900px">
          <form #mealForm="ngForm" novalidate>
            <div class="row g-4">
              <!-- Left column -->
              <div class="col-12 col-md-5">
                <h5 class="mb-3">Meal</h5>

                <label class="form-label text-muted">Meal Type</label>
                <select
                  class="form-select"
                  [(ngModel)]="mealType"
                  name="mealType"
                  required
                  #mealTypeCtrl="ngModel"
                >
                  <option value="" disabled>Select meal type</option>
                  <option *ngFor="let type of mealTypes" [value]="type">
                    {{ type }}
                  </option>
                </select>

                <div
                  *ngIf="mealTypeCtrl.touched && mealTypeCtrl.invalid"
                  class="text-danger small mt-1"
                >
                  Please select a meal type.
                </div>

                <div class="text-center">
                  <button
                    class="btn btn-link mt-3 p-0 text-decoration-underline"
                    (click)="backToStep1()"
                  >
                    Enter a different meal description
                  </button>
                </div>
              </div>

              <!-- Right column -->
              <div class="col-12 col-md-7 d-flex flex-column">
                <div
                  class="d-flex justify-content-between align-items-center mb-2"
                >
                  <h5 class="mb-0">Items</h5>

                  <button
                    class="btn btn-sm btn-outline-secondary"
                    (click)="addItem()"
                    [disabled]="!canAddItem()"
                  >
                    + Add item
                  </button>
                </div>

                <div *ngIf="itemsError" class="text-danger small mt-1">
                  Add at least one food item.
                </div>

                <!-- header -->
                <div
                  *ngIf="mealItems.items.length > 0"
                  class="row small text-muted fw-semibold mb-2"
                >
                  <div class="col-6">Name</div>
                  <div class="col-4">Quantity</div>
                </div>

                <!-- items list -->
                <div
                  class="d-flex flex-column"
                  style="
                    max-height: 320px;
                    height: 320px;
                    overflow-y: auto;
                    overflow-x: hidden;
                    width: 100%;
                  "
                >
                  <div
                    *ngFor="let item of mealItems.items; let i = index"
                    class="row g-2 align-items-center mb-2 w-100"
                    style="min-width: 0"
                  >
                    <!-- name -->
                    <div class="col-6" style="position: relative">
                      <input
                        class="form-control w-100"
                        [class.is-invalid]="nameCtrl.touched && nameCtrl.invalid && !itemsError"
                        [(ngModel)]="item.name"
                        name="itemName{{ i }}"
                        required
                        #nameCtrl="ngModel"
                        placeholder="Food name"
                        (ngModelChange)="saveMealError = ''"
                      />
                      <div
                        *ngIf="nameCtrl.touched && nameCtrl.invalid && !itemsError"
                        class="invalid-tooltip"
                      >
                        Enter a food name.
                      </div>
                    </div>

                    <!-- quantity -->
                    <div class="col-4" style="position: relative">
                      <input
                        class="form-control w-100"
                        [class.is-invalid]="qtyCtrl.touched && qtyCtrl.invalid && !itemsError"
                        type="number"
                        [(ngModel)]="item.quantityGrams"
                        name="itemQty{{ i }}"
                        required
                        min="1"
                        #qtyCtrl="ngModel"
                        placeholder="g"
                      />
                      <div
                        *ngIf="qtyCtrl.touched && qtyCtrl.invalid && !itemsError"
                        class="invalid-tooltip"
                      >
                        <span *ngIf="qtyCtrl.errors?.['required']">Enter a quantity in grams.</span>
                        <span *ngIf="qtyCtrl.errors?.['min']">Quantity must be greater than 0.</span>
                      </div>
                    </div>

                    <!-- DELETE -->
                    <div class="col-2 d-flex justify-content-end">
                      <button
                        class="btn btn-outline-danger btn-sm"
                        (click)="removeItem(i)"
                      >
                        ✕
                      </button>
                    </div>
                  </div>
                </div>

                <div
                  *ngIf="mealItems.items.length === 0"
                  class="text-muted small text-center py-3"
                >
                  No items yet
                </div>

                <div class="mt-3 d-grid gap-2">
                  <button
                    class="btn btn-fitbite text-white"
                    (click)="submitMeal(mealForm)"
                    [disabled]="isSaving"
                  >
                    <span *ngIf="!isSaving">Save Meal</span>
                    <span *ngIf="isSaving">Saving...</span>
                  </button>
                  <div class="text-danger small" style="min-height: 1.25rem">
                    {{ saveMealError }}
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
