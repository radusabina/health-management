<div *ngIf="isOpen" class="modal-backdrop-custom">
  <div class="modal-container">
    <div class="modal-content">
      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="mb-0">Set your goal</h5>

        <button type="button" class="btn-close" (click)="onClose()"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <div class="form-group mb-3">
          <label class="form-label small text-muted">Calories</label>
          <input
            type="number"
            class="form-control"
            placeholder="e.g. 2000"
            [(ngModel)]="goal.calorieGoal"
          />
        </div>

        <div class="form-group mb-3">
          <label class="form-label small text-muted">Water (ml)</label>
          <input
            type="number"
            class="form-control"
            placeholder="e.g. 2000"
            [(ngModel)]="goal.waterGoal"
          />
        </div>

        <div class="form-group mb-3">
          <label class="form-label small text-muted">Target weight (kg)</label>
          <input
            type="number"
            class="form-control"
            placeholder="e.g. 70"
            [(ngModel)]="goal.weightTarget"
          />
        </div>

        <div class="form-group mb-1">
          <label class="form-label small text-muted">What size is your bottle? (ml)</label>
          <input
            type="number"
            class="form-control"
            placeholder="e.g. 500"
            [(ngModel)]="goal.bottleAmountMl"
          />
        </div>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer d-flex justify-content-between mt-3">
        <button class="btn btn-outline-secondary px-4" (click)="onClose()">
          Cancel
        </button>

        <button class="btn btn-fitbite text-white px-4" (click)="onSave()">
          Save
        </button>
      </div>
    </div>
  </div>
</div>
