<nav
  class="navbar navbar-expand-lg py-2 navbar-glass"
  data-bs-theme="light"
>
  <div class="container-fluid">
    <a
      class="navbar-brand fw-semibold fs-4 text-dark"
      routerLink="/dashboard"
      >Fitbite</a
    >

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNavbar"
      aria-controls="mainNavbar"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse text-end" id="mainNavbar">
      <ul
        class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-end align-items-lg-center"
      >
        <li class="nav-item">
          <a
            class="nav-link me-lg-2 fs-5 text-dark nav-pill"
            routerLink="/dashboard"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link me-lg-2 fs-5 text-dark nav-pill"
            routerLink="/overview"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Overview
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link me-lg-2 fs-5 text-dark nav-pill"
            routerLink="/recommendations"
            routerLinkActive="nav-active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            Recommendations
          </a>
        </li>
        <li class="nav-item dropdown">
          <button
            class="nav-link text-dark p-0 border-0 bg-transparent fs-5 nav-pill profile-link dropdown-toggle-no-caret"
            (click)="toggleDropdown()"
            aria-label="Profile menu"
            type="button"
            [attr.aria-expanded]="dropdownOpen"
          >
            <span class="d-inline d-lg-none">Profile & Settings</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              fill="currentColor"
              class="bi bi-person-circle d-none d-lg-inline"
              viewBox="0 0 16 16"
              aria-hidden="true"
            >
              <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
              <path
                fill-rule="evenodd"
                d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10.5 8 10.5c3.195 0 4.757.726 5.468 1.87A7 7 0 0 0 8 1z"
              />
            </svg>
          </button>
          <ul class="dropdown-menu shadow-sm border-0 mt-2 profile-dropdown-menu" [class.show]="dropdownOpen">
            <li>
              <a class="dropdown-item d-flex align-items-center gap-2" routerLink="/profile" (click)="dropdownOpen = false">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                  <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.029 10 8 10c-2.029 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
                </svg>
                Profile & Settings
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button class="dropdown-item d-flex align-items-center gap-2 text-danger" (click)="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" class="bi bi-box-arrow-right" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
                  <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
                </svg>
                Logout
              </button>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
